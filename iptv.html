<style>
  :root {
    --bg: #0a0c10;
    --surface: #12161e;
    --card: #1a1f2e;
    --border: #2a3045;
    --accent: #e63946;
    --accent2: #f4a261;
    --text: #e8eaf0;
    --muted: #7a8099;
    --live: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(230,57,70,0.15);
  }
  .nav-logo { font-family: 'Nunito ', sans-serif; font-size: 1.4rem; color: var(--accent); letter-spacing: 2px; }
  .nav-logo span { color: var(--accent2); }
  .nav-links { display: flex; gap: 8px; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600;
    padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
    letter-spacing: 0.5px; text-transform: none;
  }
  .nav-links a:hover, .nav-links a.active { background: var(--accent); color: #fff; }
  .live-badge {
    display: flex; align-items: center; gap: 6px; font-size: 0.8rem;
    color: var(--live); font-weight: 700;
  }
  .live-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  /* PLAYER SECTION */
  .player-section {
    background: linear-gradient(180deg, #0d1018 0%, var(--bg) 100%);
    padding: 20px 24px 0;
  }
  .player-wrap {
    max-width: 900px; margin: 0 auto;
    background: #000; border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    position: relative;
  }
  #mainPlayer { width: 100%; display: block; max-height: 480px; background: #000; }
  .player-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); flex-direction: column; gap: 12px;
  }
  .player-overlay.hidden { display: none; }
  .play-icon { font-size: 3rem; color: var(--accent); }
  .overlay-text { color: var(--muted); font-size: 0.9rem; }
  .now-playing-bar {
    max-width: 900px; margin: 0 auto;
    background: var(--card); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 10px 10px;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  }
  .now-logo { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: var(--border); }
  .now-info { flex: 1; }
  .now-name { font-weight: 700; font-size: 0.95rem; }
  .now-group { font-size: 0.75rem; color: var(--muted); }
  .ctrl-btns { display: flex; gap: 8px; }
  .ctrl-btn {
    background: var(--border); border: none; color: var(--text);
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: var(--accent); }

  /* MAIN LAYOUT */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* SEARCH + FILTER */
  .toolbar {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-family: inherit; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 10px 16px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 600;
    transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* GROUP SECTION */
  .group-section { margin-bottom: 32px; }
  .group-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
    letter-spacing: 2px; color: var(--accent2);
    border-left: 4px solid var(--accent); padding-left: 12px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  }
  .group-count {
    font-family: 'Nunito', sans-serif; font-size: 0.7rem;
    background: var(--border); color: var(--muted);
    padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: 0;
  }
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .ch-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 10px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-align: center; position: relative; overflow: hidden;
  }
  .ch-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(230,57,70,0.2); }
  .ch-card.playing { border-color: var(--live); box-shadow: 0 0 16px rgba(34,197,94,0.25); }
  .ch-logo { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: var(--border); }
  .ch-name { font-size: 0.78rem; font-weight: 700; color: var(--text); line-height: 1.2; }
  .ch-playing-ind {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; background: var(--live); border-radius: 50%;
    display: none; animation: pulse 1.5s infinite;
  }
  .ch-card.playing .ch-playing-ind { display: block; }

  /* FOOTER */
  footer {
    background: var(--surface); border-top: 1px solid var(--border);
    text-align: center; padding: 30px; color: var(--muted); font-size: 1.0rem;
    margin-top: 40px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  .footer-links { display: flex; gap: 50px; justify-content: center; flex-wrap: wrap; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media(max-width:600px) {
    .nav-links { display: none; }
    .channels-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>

let currentIndex = -1;
let hls = null;
let currentFilter = '__all__'; // Track current filter: '__all__' or group name

const video = document.getElementById('mainPlayer');
const overlay = document.getElementById('playerOverlay');
const nowName = document.getElementById('nowName');
const nowGroup = document.getElementById('nowGroup');
const nowLogo = document.getElementById('nowLogo');

function playChannel(idx) {
  if (idx < 0 || idx >= channels.length) return;
  document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('playing'));
  const card = document.querySelector(`.ch-card[data-idx="${idx}"]`);
  if (card) { card.classList.add('playing'); }
  // scroll to the top of the page to show the video player fully
  window.scrollTo({top: 0, behavior: 'smooth'});
  currentIndex = idx;
  const ch = channels[idx];
  nowName.textContent = ch.name;
  nowGroup.textContent = ch.group;
  nowLogo.src = ch.logo;
  nowLogo.style.display = 'block';
  overlay.classList.add('hidden');
  if (hls) { hls.destroy(); hls = null; }
  // ensure previous src is cleared to avoid mixed media states
  try { video.pause(); } catch(e){}
  video.removeAttribute('src');
  video.load();
  if (Hls.isSupported()) {
    hls = new Hls({ enableWorker: true, lowLatencyMode: true });
    hls.on(Hls.Events.ERROR, (e, data) => {
      console.error('HLS error', e, data);
      if (data && data.fatal) {
        overlay.classList.remove('hidden');
        const msg = data.type ? `${data.type}` : 'Stream error';
        const details = data.details ? `: ${data.details}` : '';
        overlay.querySelector('.overlay-text').textContent = `⚠ ${msg}${details}`;
      }
    });
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(err => { console.warn('play() rejected', err); }));
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url;
    video.play().catch(()=>{});
  }
}

function prevChannel() {
  if (currentIndex <= 0) playChannel(channels.length - 1);
  else playChannel(currentIndex - 1);
}
function nextChannel() {
  if (currentIndex >= channels.length - 1) playChannel(0);
  else playChannel(currentIndex + 1);
}
function togglePlay() {
  if (video.paused) video.play().catch(()=>{});
  else video.pause();
}

// Build groups
function getGroups() {
  const seen = new Set();
  const order = [];
  channels.forEach(c => { if (!seen.has(c.group)) { seen.add(c.group); order.push(c.group); } });
  return order;
}

function buildFilterBtns(groups) {
  const container = document.getElementById('filterBtns');
  container.innerHTML = '';
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = g;
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('searchInput').value = '';
      currentFilter = g;
      displayChannelsByGroup(g);
    };
    container.appendChild(btn);
  });
}

function buildChannels(list) {
  const container = document.getElementById('channelContainer');
  container.innerHTML = '';
  const grouped = {};
  list.forEach((ch, realIdx) => {
    if (!grouped[ch.group]) grouped[ch.group] = [];
    grouped[ch.group].push({ch, realIdx});
  });
  Object.entries(grouped).forEach(([group, items]) => {
    const sec = document.createElement('div');
    sec.className = 'group-section';
    sec.id = 'group-' + group.replace(/\s+/g,'_');
    sec.innerHTML = `<div class="group-title">${group} <span class="group-count">${items.length}</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'channels-grid';
    items.forEach(({ch, realIdx}) => {
      const card = document.createElement('div');
      card.className = 'ch-card';
      card.dataset.idx = realIdx;
      card.innerHTML = `
        <div class="ch-playing-ind"></div>
        <img class="ch-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect width=%2252%22 height=%2252%22 fill=%22%232a3045%22/><text x=%2226%22 y=%2232%22 text-anchor=%22middle%22 fill=%22%237a8099%22 font-size=%2218%22>📺</text></svg>'"/>
        <div class="ch-name">${ch.name}</div>`;
      card.onclick = () => playChannel(realIdx);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

function filterChannels() {
  const searchInput = document.getElementById('searchInput');
  const q = searchInput.value.toLowerCase().trim();
  const searchResultsContainer = document.getElementById('searchResultsContainer');
  const channelContainer = document.getElementById('channelContainer');
  
  if (!q) {
    // No search query - show normal grouped view
    searchResultsContainer.style.display = 'none';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    currentFilter = '__all__';
    buildChannelsFull(channels.map((ch, i) => ({...ch, _idx: i})));
    return;
  }
  
  // Search query active - search by channel NAME only
  let list = channels.map((ch, i) => ({...ch, _idx: i}));
  list = list.filter(ch => ch.name.toLowerCase().includes(q));
  
  // Hide normal channel container
  channelContainer.innerHTML = '';
  channelContainer.style.display = 'none';
  
  // Show search results
  searchResultsContainer.style.display = 'block';
  searchResultsContainer.innerHTML = '';
  
  if (list.length === 0) {
    searchResultsContainer.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">❌ Not Available - Channel not found</p>';
    return;
  }
  
  const grid = document.createElement('div');
  grid.className = 'channels-grid';
  grid.style.marginBottom = '30px';
  
  list.forEach(ch => {
    const realIdx = ch._idx;
    const card = document.createElement('div');
    card.className = 'ch-card';
    card.dataset.idx = realIdx;
    if (realIdx === currentIndex) card.classList.add('playing');
    card.innerHTML = `
      <div class="ch-playing-ind"></div>
      <img class="ch-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect width=%2252%22 height=%2252%22 fill=%22%232a3045%22/><text x=%2226%22 y=%2232%22 text-anchor=%22middle%22 fill=%22%237a8099%22 font-size=%2218%22>📺</text></svg>'"/>
      <div class="ch-name">${ch.name}</div>`;
    card.onclick = () => playChannel(realIdx);
    grid.appendChild(card);
  });
  
  searchResultsContainer.appendChild(grid);
}

function displayChannelsByGroup(groupName) {
  const searchResultsContainer = document.getElementById('searchResultsContainer');
  const channelContainer = document.getElementById('channelContainer');
  
  searchResultsContainer.style.display = 'none';
  channelContainer.style.display = 'block';
  
  // Get channels for this group only
  let groupChannels = channels
    .map((ch, i) => ({...ch, _idx: i}))
    .filter(ch => ch.group === groupName);
  
  // Render only this group
  channelContainer.innerHTML = '';
  const sec = document.createElement('div');
  sec.className = 'group-section';
  sec.id = 'group-' + groupName.replace(/\s+/g,'_');
  sec.innerHTML = `<div class="group-title">${groupName} <span class="group-count">${groupChannels.length}</span></div>`;
  
  const grid = document.createElement('div');
  grid.className = 'channels-grid';
  
  groupChannels.forEach(ch => {
    const realIdx = ch._idx;
    const card = document.createElement('div');
    card.className = 'ch-card';
    card.dataset.idx = realIdx;
    if (realIdx === currentIndex) card.classList.add('playing');
    card.innerHTML = `
      <div class="ch-playing-ind"></div>
      <img class="ch-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect width=%2252%22 height=%2252%22 fill=%22%232a3045%22/><text x=%2226%22 y=%2232%22 text-anchor=%22middle%22 fill=%22%237a8099%22 font-size=%2218%22>📺</text></svg>'"/>
      <div class="ch-name">${ch.name}</div>`;
    card.onclick = () => playChannel(realIdx);
    grid.appendChild(card);
  });
  
  sec.appendChild(grid);
  channelContainer.appendChild(sec);
  
  // Auto-scroll to this group
  setTimeout(() => {
    sec.scrollIntoView({behavior: 'smooth', block: 'start'});
  }, 100);
}

function buildChannelsFull(list) {
  const container = document.getElementById('channelContainer');
  const searchResultsContainer = document.getElementById('searchResultsContainer');
  
  // Make sure search results are hidden when showing full view
  searchResultsContainer.style.display = 'none';
  container.style.display = 'block';
  container.innerHTML = '';
  
  const grouped = {};
  list.forEach(ch => {
    if (!grouped[ch.group]) grouped[ch.group] = [];
    grouped[ch.group].push(ch);
  });
  if (Object.keys(grouped).length === 0) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No channels found.</p>';
    return;
  }
  Object.entries(grouped).forEach(([group, items]) => {
    const sec = document.createElement('div');
    sec.className = 'group-section';
    sec.id = 'group-' + group.replace(/\s+/g,'_');
    sec.innerHTML = `<div class="group-title">${group} <span class="group-count">${items.length}</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'channels-grid';
    items.forEach(ch => {
      const realIdx = ch._idx !== undefined ? ch._idx : channels.indexOf(ch);
      const card = document.createElement('div');
      card.className = 'ch-card';
      card.dataset.idx = realIdx;
      if (realIdx === currentIndex) card.classList.add('playing');
      card.innerHTML = `
        <div class="ch-playing-ind"></div>
        <img class="ch-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect width=%2252%22 height=%2252%22 fill=%22%232a3045%22/><text x=%2226%22 y=%2232%22 text-anchor=%22middle%22 fill=%22%237a8099%22 font-size=%2218%22>📺</text></svg>'"/>
        <div class="ch-name">${ch.name}</div>`;
      card.onclick = () => playChannel(realIdx);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

function filterAll() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResultsContainer').style.display = 'none';
  document.getElementById('channelContainer').style.display = 'block';
  currentFilter = '__all__';
  buildChannelsFull(channels.map((ch,i) => ({...ch, _idx:i})));
}

function scrollToGroup(name) {
  const el = document.getElementById('group-' + name);
  if (el) el.scrollIntoView({behavior:'smooth'});
}

// Init
const groups = getGroups();
buildFilterBtns(groups);
buildChannelsFull(channels.map((ch,i) => ({...ch, _idx:i})));
